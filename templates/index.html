<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Career Guidance Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h3>🤖 Career Guidance Bot</h3>
        </div>
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">
                Hello! I am your Smart Career Guide. Rate your skills from 1 (Low) to 5 (High) to find your ideal career.
            </div>
        </div>
        <div class="chat-input-area" id="input-area">
            <!-- Dynamic choice buttons will load here via script.js -->
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
